<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Saar's Uitjes" />
  <meta name="theme-color" content="#F0EDE8" />
  <title>Saar's Uitjes</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:    #F0EDE8;
      --cream2:   #E8E4DD;
      --ink:      #1C1A17;
      --ink2:     #3D3A35;
      --muted:    #8C8880;
      --muted2:   #B5B0A8;
      --border:   rgba(28,26,23,0.10);
      --border2:  rgba(28,26,23,0.06);
      --accent:   #C4430A;
      --accent-bg: rgba(196,67,10,0.08);
      --green:    #3D6B4A;
      --safe-top: env(safe-area-inset-top, 44px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      background: var(--cream);
      color: var(--ink);
      min-height: 100dvh;
      overflow-x: hidden;
      font-size: 12px;
    }

    /* ─────────────────────────────
       HEADER
    ───────────────────────────────*/
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: calc(var(--safe-top) + 6px) 20px 10px;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-wordmark {
      display: flex;
      flex-direction: column;
      gap: 1px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      background: none;
      border: none;
      padding: 0;
      text-align: left;
    }
    .header-wordmark:active { opacity: 0.6; }
    .header-eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: lowercase;
    }
    .header-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 20px;
      font-weight: 900;
      font-style: italic;
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .surprise-btn {
      background: var(--ink);
      border: none;
      border-radius: 2px;
      padding: 8px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      color: var(--cream);
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .surprise-btn:active { opacity: 0.75; transform: scale(0.97); }

    /* ─────────────────────────────
       SCROLL CONTENT
    ───────────────────────────────*/
    .scroll-root {
      padding-top: calc(var(--safe-top) + 62px);
      padding-bottom: calc(var(--safe-bottom) + 68px);
      min-height: 100dvh;
      overflow-y: auto;
    }

    /* ─────────────────────────────
       SEARCH
    ───────────────────────────────*/
    .search-wrap { padding: 16px 20px 12px; }
    .search-bar {
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--cream);
    }
    .search-bar input {
      background: none;
      border: none;
      outline: none;
      color: var(--ink);
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      flex: 1;
      letter-spacing: 0.02em;
    }
    .search-bar input::placeholder { color: var(--muted2); }
    .search-icon { color: var(--muted2); flex-shrink: 0; }

    /* ─────────────────────────────
       FILTER CHIPS  — text-only, no pills
    ───────────────────────────────*/
    .filter-scroll {
      display: flex;
      gap: 0;
      padding: 0 20px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border);
      border-right: none;
      padding: 7px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .chip:last-child { border-right: 1px solid var(--border); }
    .chip.on {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--cream);
    }
    .chip.on + .chip { border-left-color: var(--ink); }

    /* ─────────────────────────────
       SECTION HEADER — editorial style
    ───────────────────────────────*/
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 20px 20px 10px;
    }
    .section-head-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .section-head-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: lowercase;
    }

    /* ─────────────────────────────
       HERO CARD  — full-width editorial
    ───────────────────────────────*/
    .hero-card {
      margin: 0 20px 8px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      height: 160px;
      -webkit-tap-highlight-color: transparent;
    }
    .hero-card:active { opacity: 0.92; }
    .hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(28,26,23,0.82) 0%, rgba(28,26,23,0.1) 55%, transparent 100%);
    }
    .hero-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 20px 18px;
      z-index: 1;
    }
    .hero-eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: rgba(240,237,232,0.7);
      margin-bottom: 5px;
    }
    .hero-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 26px;
      font-weight: 900;
      color: #F0EDE8;
      letter-spacing: -0.02em;
      line-height: 1.05;
      margin-bottom: 8px;
    }
    .hero-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: rgba(240,237,232,0.65);
    }
    .hero-sep { width: 1px; height: 10px; background: rgba(240,237,232,0.3); }
    .hero-free { color: #A8D5B5; }

    /* ─────────────────────────────
       HORIZONTAL CARD RAIL
    ───────────────────────────────*/
    .card-rail {
      display: flex;
      gap: 12px;
      padding: 0 20px 4px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
    }
    .card-rail::-webkit-scrollbar { display: none; }

    .rail-card {
      flex-shrink: 0;
      width: 150px;
      cursor: pointer;
      scroll-snap-align: start;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .rail-card:active { opacity: 0.8; }

    .rail-thumb {
      width: 150px;
      height: 200px;
      position: relative;
      overflow: hidden;
      background-color: var(--cream2);
      margin-bottom: 10px;
    }
    .rail-thumb-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }
    .rail-thumb-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(28,26,23,0.6) 0%, transparent 50%);
    }
    .rail-thumb .time-badge {
      position: absolute;
      bottom: 10px; left: 10px;
      z-index: 1;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: rgba(240,237,232,0.9);
    }
    .rail-thumb .fav-mark {
      position: absolute;
      top: 10px; right: 10px;
      z-index: 1;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .rail-thumb .fav-mark.show { opacity: 1; }

    .rail-card-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.01em;
      line-height: 1.25;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rail-card-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: lowercase;
    }

    /* photo backgrounds */
    .rail-thumb, .hero-bg, .detail-hero-bg, .surprise-hero-bg {
      background-size: cover;
      background-position: center;
    }

    /* ─────────────────────────────
       SECTION DIVIDER LINE
    ───────────────────────────────*/
    .divider {
      margin: 20px 20px 0;
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ─────────────────────────────
       VERTICAL LIST (search / fav)
    ───────────────────────────────*/
    .list-view { display: none; }
    .list-view.visible { display: block; }

    .list-item {
      display: flex;
      align-items: stretch;
      gap: 0;
      border-bottom: 1px solid var(--border2);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .list-item:active { background: var(--cream2); }
    .list-thumb-wrap {
      width: 72px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .list-thumb {
      width: 100%;
      height: 72px;
      background-color: var(--cream2);
      background-size: cover;
      background-position: center;
    }
    .list-info {
      flex: 1;
      min-width: 0;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .list-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.01em;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .list-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 6px;
      padding: 12px 16px 12px 0;
    }
    .list-time {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--ink2);
    }
    .list-fav {
      font-size: 14px;
      color: var(--muted2);
      line-height: 1;
      cursor: pointer;
    }
    .list-fav.on { color: var(--accent); }

    /* ─────────────────────────────
       TAGS
    ───────────────────────────────*/
    .itag {
      display: inline-block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      padding: 3px 8px;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      border: 1px solid var(--border);
    }
    .itag-ink    { border-color: var(--ink); color: var(--ink); }
    .itag-muted  { border-color: var(--border); color: var(--muted); }
    .itag-free   { border-color: var(--green); color: var(--green); }
    .itag-accent { border-color: var(--accent); color: var(--accent); }

    /* ─────────────────────────────
       MAP
    ───────────────────────────────*/
    .map-container {
      height: calc(100dvh - 180px);
      position: relative;
    }
    #map { width: 100%; height: 100%; }
    .map-legend {
      position: absolute;
      bottom: 16px; left: 16px;
      background: var(--cream);
      border: 1px solid var(--border);
      padding: 10px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ─────────────────────────────
       BOTTOM NAV — editorial tabs
    ───────────────────────────────*/
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--cream);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border: none;
      background: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.10em;
      text-transform: lowercase;
      color: var(--muted2);
      gap: 5px;
      transition: color 0.15s;
    }
    .nav-item.active { color: var(--ink); }
    .nav-item svg { color: var(--muted2); transition: color 0.15s; }
    .nav-item.active svg { color: var(--ink); }

    /* ─────────────────────────────
       MODAL  (bottom sheet)
    ───────────────────────────────*/
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(28,26,23,0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--cream);
      border-top: 1px solid var(--border);
      width: 100%;
      max-height: 92dvh;
      overflow-y: auto;
      padding: 20px 20px calc(var(--safe-bottom) + 24px);
    }
    .modal-handle {
      width: 32px; height: 3px;
      background: var(--muted2);
      border-radius: 2px;
      margin: 0 auto 24px;
    }
    .modal-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      font-weight: 900;
      font-style: italic;
      color: var(--ink);
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
      background: var(--cream);
      color: var(--ink);
      border-radius: 0;
      letter-spacing: 0.02em;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--ink);
    }
    .form-input::placeholder { color: var(--muted2); }
    .form-textarea { resize: vertical; min-height: 80px; }

    .emoji-picker { display: flex; flex-wrap: wrap; gap: 6px; }
    .emoji-option {
      width: 42px; height: 42px;
      border: 1px solid var(--border);
      background: var(--cream);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.12s;
      border-radius: 0;
    }
    .emoji-option.selected { border-color: var(--ink); background: var(--cream2); }

    .pill-group { display: flex; gap: 0; flex-wrap: wrap; }
    .pill {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-right: none;
      background: var(--cream);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: lowercase;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.12s;
      -webkit-tap-highlight-color: transparent;
      border-radius: 0;
    }
    .pill:last-child { border-right: 1px solid var(--border); }
    .pill.on { background: var(--ink); border-color: var(--ink); color: var(--cream); }

    .btn-primary {
      width: 100%; padding: 14px;
      background: var(--ink);
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: lowercase;
      color: var(--cream);
      cursor: pointer; margin-top: 12px;
      transition: opacity 0.15s;
      border-radius: 0;
    }
    .btn-primary:active { opacity: 0.75; }
    .btn-secondary {
      width: 100%; padding: 13px;
      background: none;
      border: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      color: var(--muted);
      cursor: pointer; margin-top: 8px;
      border-radius: 0;
    }

    /* ─────────────────────────────
       SURPRISE MODAL
    ───────────────────────────────*/
    .surprise-hero {
      overflow: hidden;
      height: 220px;
      display: flex;
      align-items: flex-end;
      position: relative;
      margin-bottom: 16px;
    }
    .surprise-hero-bg {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center;
    }
    .surprise-hero-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(28,26,23,0.88) 20%, rgba(28,26,23,0.05));
    }
    .surprise-hero-info {
      position: relative; z-index: 1;
      padding: 18px 18px;
      width: 100%;
    }
    .surprise-eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: rgba(240,237,232,0.6);
      margin-bottom: 4px;
    }
    .surprise-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 24px;
      font-weight: 900;
      font-style: italic;
      color: #F0EDE8;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }
    .surprise-desc {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.02em;
      color: var(--ink2);
      line-height: 1.7;
      margin: 14px 0;
    }
    .surprise-meta {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .surprise-meta-item {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-right: none;
    }
    .surprise-meta-item:last-child { border-right: 1px solid var(--border); }

    @keyframes fadeUp {
      0% { transform: translateY(12px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .surprise-hero { animation: fadeUp 0.3s ease-out; }

    /* ─────────────────────────────
       DETAIL VIEW
    ───────────────────────────────*/
    .detail-overlay {
      position: fixed; inset: 0;
      background: var(--cream);
      z-index: 150;
      overflow-y: auto;
    }
    .detail-overlay.hidden { display: none; }
    .detail-hero-wrap {
      height: 300px;
      position: relative;
      overflow: hidden;
    }
    .detail-hero-bg {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center;
    }
    .detail-hero-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, var(--cream) 0%, rgba(240,237,232,0.1) 60%);
    }
    .detail-hero-back {
      position: absolute;
      top: calc(var(--safe-top) + 10px); left: 20px;
      background: var(--cream);
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      color: var(--ink);
      cursor: pointer; z-index: 2;
      display: flex; align-items: center; gap: 6px;
      -webkit-tap-highlight-color: transparent;
      padding: 6px 10px;
      border: 1px solid var(--border);
    }
    .detail-content { padding: 0 20px 50px; }
    .detail-eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .detail-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 32px;
      font-weight: 900;

      margin-bottom: 14px;

      padding-left: 14px;
    }

      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }
    .detail-stat {
      padding: 16px;
      border-right: 1px solid var(--border);
      text-align: center;
    }
    .detail-stat:nth-child(2) { border-right: none; }
    .detail-stat-val {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .detail-stat-key {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.10em;
      text-transform: lowercase;
      color: var(--muted);
    }
    .detail-section-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: var(--muted);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border2);
    }
    .notes-field {
      width: 100%; padding: 12px;
      border: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.02em;
      resize: vertical; min-height: 90px;
      outline: none;
      color: var(--ink); background: var(--cream); line-height: 1.6;
      border-radius: 0;
    }
    .notes-field:focus { border-color: var(--ink); }
    .save-btn {
      margin-top: 8px; background: none;
      border: 1px solid var(--border);
      padding: 9px 16px; color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      cursor: pointer;
      border-radius: 0;
    }
    .action-row { display: flex; gap: 0; margin-top: 24px; }
    .action-row .btn-primary { margin-top: 0; flex: 1; }

      font-size: 11px; font-weight: 400;
      letter-spacing: 0.06em; text-transform: lowercase;
      color: var(--ink); cursor: pointer; white-space: nowrap;
    }
    .delete-btn {
      width: 100%; padding: 12px;
      background: none; border: 1px solid rgba(196,67,10,0.25);
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; font-weight: 400;
      letter-spacing: 0.08em; text-transform: lowercase;
      cursor: pointer; margin-top: 12px; border-radius: 0;
    }

    /* ─────────────────────────────
       PHOTO UPLOAD
    ───────────────────────────────*/
    .photo-upload-area {
      border: 1px dashed var(--muted2);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s;
      position: relative;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--cream);
      overflow: hidden;
    }
    .photo-upload-area:active { border-color: var(--ink); }
    .photo-upload-area input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .photo-upload-preview {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
    }
    .photo-upload-preview::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(240,237,232,0.4);
    }
    .photo-upload-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; letter-spacing: 0.08em;
      color: var(--muted); text-transform: lowercase;
      position: relative; z-index: 1;
    }
    .photo-upload-hint {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px; letter-spacing: 0.06em;
      color: var(--muted2); text-transform: lowercase;
      position: relative; z-index: 1;
    }

    /* ─────────────────────────────
       FILTER RANGE
    ───────────────────────────────*/
    .filter-section-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: lowercase;
      color: var(--muted); margin: 22px 0 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border2);
    }
    .filter-section-title:first-child { margin-top: 0; }
    .range-row {
      display: flex; justify-content: space-between;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--muted); margin-bottom: 10px;
    }
    .range-row strong {
      color: var(--ink); font-weight: 500;
    }
    input[type="range"] {
      -webkit-appearance: none; width: 100%;
      height: 2px; border-radius: 0;
      background: var(--border); outline: none; margin-bottom: 4px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--ink); cursor: pointer;
      border: 3px solid var(--cream);
      box-shadow: 0 0 0 1px var(--ink);
    }

    /* ─────────────────────────────
       EMPTY STATE
    ───────────────────────────────*/
    .empty {
      text-align: center; padding: 60px 40px;
    }
    .empty-icon {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--muted2);
      margin-bottom: 16px;
      text-transform: lowercase;
    }
    .empty h3 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 18px;
      font-weight: 700;
      font-style: italic;
      margin-bottom: 8px;
      color: var(--ink);
    }
    .empty p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--muted); line-height: 1.6;
    }
  </style>
</head>

function toRow(a) {
  return {
    id: a.id, name: a.name, photo: a.photo || null,
    time: a.time, transport: a.transport,
    weather: a.weather, types: a.types,
    free: a.free, description: a.description || '',

    lat: a.lat || null, lng: a.lng || null,

  };
}

function fromRow(r) {
  return {
    id: r.id, name: r.name, photo: r.photo || null,
    time: r.time, transport: r.transport,
    weather: r.weather || [], types: r.types || [],
    free: r.free, description: r.description || '',
    mapsLink: r.maps_link || null,
    lat: r.lat || null, lng: r.lng || null,
    notes: r.notes || '', fav: r.fav
  };
}

async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: SB_HEADERS, ...options
  });
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadFromSupabase() {
  const rows = await sbFetch('adventures?select=*&order=id');
  if (rows && rows.length > 0) {
    adventures = rows.map(fromRow);
    nextId = Math.max(...adventures.map(a => a.id)) + 1;
  } else {
    // eerste keer: laad standaard data en upload naar Supabase
    await seedSupabase();
  }
}

async function seedSupabase() {
  for (const a of adventures) {
    await sbFetch('adventures', {
      method: 'POST',
      body: JSON.stringify(toRow(a))
    });
  }
}

async function save(adventure) {

    method: 'PATCH',
    body: JSON.stringify(toRow(adventure))
  });
}

async function insertAdventure(adventure) {

function getFiltered() {
  return adventures.filter(a => {
    if (searchQuery && !a.name.toLowerCase().includes(searchQuery) && !a.description.toLowerCase().includes(searchQuery)) return false;
    if (activeFilters.maxTime < 60 && a.time > activeFilters.maxTime) return false;
    if (activeFilters.weather.length && !activeFilters.weather.some(w => a.weather.includes(w))) return false;
    if (activeFilters.types.length && !activeFilters.types.some(t => a.types.includes(t))) return false;
    return true;
  });
}

function onSearch() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
  if (searchQuery) {
    document.getElementById('homeView').style.display = 'none';
    document.getElementById('listView').classList.add('visible');
    renderListView(getFiltered());
  } else {
    document.getElementById('homeView').style.display = '';
    document.getElementById('listView').classList.remove('visible');
  }
}

function initMap() {

  const link = document.createElement('link');
  link.rel = 'stylesheet'; link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
  document.head.appendChild(link);
  const script = document.createElement('script');
  script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  script.onload = () => {
    leafletMap = L.map('map', { zoomControl:false }).setView([52.06, 6.12], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution:'© OpenStreetMap © CARTO'
    }).addTo(leafletMap);
    updateMapMarkers();
  };
  document.head.appendChild(script);
}

function coordsFromMapsLink(url) {
  if (!url) return null;
  // format: @lat,lng or ?q=lat,lng or ll=lat,lng
  let m;
  m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  m = url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  m = url.match(/ll=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  // format: ?q=placename — geocode via Nominatim
  m = url.match(/[?&]q=([^&]+)/);
  if (m) return geocodeName(decodeURIComponent(m[1].replace(/\+/g,' ')));
  // google.com/maps/place/Name/@lat,lng
  m = url.match(/maps\/place\/([^/]+)\//);
  if (m) return geocodeName(decodeURIComponent(m[1].replace(/\+/g,' ')));
  return null;
}

async function geocodeName(name) {
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(name)}&limit=1`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'nl' } });
    const data = await res.json();
    if (data && data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  } catch(e) {}
  return null;
}

function updateMapMarkers() {
  if (!leafletMap) return;
  mapMarkers.forEach(m => m.remove()); mapMarkers = [];
  const withCoords = adventures.filter(a => a.lat && a.lng);
  if (withCoords.length === 0) {
    document.getElementById('mapView').innerHTML = `
      <div style="padding:40px 20px;text-align:center">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.12em;color:var(--muted);margin-bottom:12px">— geen locaties —</div>
        <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;font-style:italic;color:var(--ink);margin-bottom:8px">Geen adressen ingevoerd</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:300;color:var(--muted);line-height:1.7">Voeg een adres toe bij een uitje<br>om het op de kaart te zien.</div>
      </div>`;
    return;
  }
  // restore map container if it was replaced
  const mapView = document.getElementById('mapView');
  if (!mapView.querySelector('#map')) {
    mapView.innerHTML = `<div class="map-container"><div id="map"></div><div class="map-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#3D6B4A"></div>dichtbij</div>
      <div class="legend-item"><div class="legend-dot" style="background:#C4430A"></div>10–20 min</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8C3A1E"></div>20+ min</div>
    </div></div>`;
    leafletMap.invalidateSize();
  }
  withCoords.forEach(a => {
    const color = a.time <= 10 ? '#3D6B4A' : a.time <= 20 ? '#C4430A' : '#8C3A1E';
    const icon = L.divIcon({
      html: `<div style="width:28px;height:28px;border-radius:50%;background:${color};border:2px solid #F0EDE8;display:flex;align-items:center;justify-content:center;font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,0.2);font-family:serif;color:white;font-weight:bold">${a.time === 0 ? '~' : a.time}</div>`,
      className:'', iconSize:[28,28], iconAnchor:[14,14]
    });
    mapMarkers.push(L.marker([a.lat, a.lng], {icon}).addTo(leafletMap)
      .bindPopup(`<b>${a.name}</b><br>${a.transport} ${a.time === 0 ? 'vlakbij' : a.time + ' min'}`));
  });
  // fit map to markers
  if (mapMarkers.length > 0) {
    const group = L.featureGroup(mapMarkers);
    leafletMap.fitBounds(group.getBounds().pad(0.2));
  }
}

      <div style="display:flex;gap:0;margin-top:12px">
        <button class="btn-secondary" style="flex:1;margin-top:0;border-right:none" onclick="openEditModal(${a.id})">bewerken</button>
        <button class="delete-btn" style="flex:1;margin-top:0;border-left:none" onclick="deleteAdventure(${a.id})">verwijderen</button>
      </div>
    </div>
  `;
  document.getElementById('detailView').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailView').classList.add('hidden');
  document.body.style.overflow = '';
  if (currentTab === 'home') renderHome();
  else if (currentTab === 'fav') renderListView(adventures.filter(a => a.fav));
}

async function saveNotes(id) {
  const a = adventures.find(x => x.id === id); if (!a) return;
  a.notes = document.getElementById('notesField').value;
  const btn = event.target; btn.textContent = '…';
  await save(a);
  btn.textContent = '✓ opgeslagen';
  setTimeout(() => btn.textContent = 'opslaan', 1500);
}

async function deleteAdventure(id) {
  if (!confirm('Uitje verwijderen?')) return;
  await deleteFromSupabase(id);
  adventures = adventures.filter(a => a.id !== id);
  closeDetail();
}

async function toggleFav(id) {
  const a = adventures.find(x => x.id === id); if (!a) return;
  a.fav = !a.fav;
  await save(a);
  if (currentTab === 'home') renderHome();
  else if (currentTab === 'fav') renderListView(adventures.filter(a => a.fav));
  else if (searchQuery) renderListView(getFiltered());
}

// ═══════════════════════════════════════════════
//  SURPRISE
// ═══════════════════════════════════════════════
function openSurprise() { openModal('surpriseModal'); rollSurprise(); }

function rollSurprise() {
  const pool = adventures.filter(a => {
    if (a.time > activeFilters.maxTime) return false;
    if (!surpriseWeathers.some(w => a.weather.includes(w))) return false;
    return true;
  });
  if (!pool.length) {
    document.getElementById('surpriseName').textContent = 'Geen uitje gevonden';
    document.getElementById('surpriseDesc').textContent = 'Pas de weer-filter aan.';
    document.getElementById('surpriseMeta').innerHTML = '';
    document.getElementById('surpriseHeroBg').style.cssText = '';
    return;
  }
  const a = pool[Math.floor(Math.random() * pool.length)];
  const hero = document.getElementById('surpriseHero');
  hero.style.animation = 'none';
  hero.offsetHeight; // reflow
  hero.style.animation = '';
  document.getElementById('surpriseHeroBg').style.cssText = photoBg(a);
  document.getElementById('surpriseName').textContent = a.name;
  document.getElementById('surpriseDesc').textContent = a.description;
  document.getElementById('surpriseMeta').innerHTML = [
    `<div class="surprise-meta-item">${a.transport} ${a.time === 0 ? 'vlakbij' : a.time + ' min'}</div>`,
    `<div class="surprise-meta-item">${a.weather.map(w=>weatherIcon[w]).join(' ')}</div>`,
    a.free ? `<div class="surprise-meta-item" style="color:var(--green)">gratis</div>` : ''
  ].join('');
}

// ═══════════════════════════════════════════════
//  CHIP / PILL TOGGLES
// ═══════════════════════════════════════════════
function toggleWChip(w, el) {
  el.classList.toggle('on');
  if (activeFilters.weather.includes(w)) activeFilters.weather = activeFilters.weather.filter(x=>x!==w);
  else activeFilters.weather.push(w);
  if (currentTab === 'home') renderHome(); else onSearch();
}

function toggleTChip(t, el) {
  el.classList.toggle('on');
  if (activeFilters.types.includes(t)) activeFilters.types = activeFilters.types.filter(x=>x!==t);
  else activeFilters.types.push(t);
  if (currentTab === 'home') renderHome(); else onSearch();
}

function toggleSurpWeather(el) {
  const w = el.dataset.w; el.classList.toggle('on');
  if (surpriseWeathers.includes(w)) surpriseWeathers = surpriseWeathers.filter(x=>x!==w);
  else surpriseWeathers.push(w);
}

function togglePill(el) { el.classList.toggle('on'); }

function setFree(val, el) {
  newIsFree = val;
  document.getElementById('pill-free').classList.toggle('on', val);
  document.getElementById('pill-paid').classList.toggle('on', !val);
}

// ═══════════════════════════════════════════════
//  FILTER MODAL
// ═══════════════════════════════════════════════
function openFilterModal() { openModal('filterModal'); }

function applyFilters() {
  activeFilters.maxTime = +document.getElementById('maxTimeSlider').value;
  closeModal('filterModal');
  if (currentTab === 'home') renderHome(); else onSearch();
}

function resetFilters() {
  activeFilters = { weather:[], types:[], maxTime:60 };
  surpriseWeathers = ['sun','cloud'];
  document.getElementById('maxTimeSlider').value = 60;
  document.getElementById('maxTimeVal').textContent = 60;
  document.querySelectorAll('#chip-sun,#chip-cloud,#chip-rain,#chip-free,#chip-water,#chip-buiten,#chip-dieren').forEach(c => c.classList.remove('on'));
  document.querySelectorAll('#surpriseWeatherPicker .pill').forEach(b => b.classList.toggle('on', ['sun','cloud'].includes(b.dataset.w)));
  closeModal('filterModal');
  if (currentTab === 'home') renderHome();
}

// ═══════════════════════════════════════════════
//  ADD / EDIT ADVENTURE
// ═══════════════════════════════════════════════
function openAddModal() {
  editingId = null;
  pendingPhotoFile = null;
  document.getElementById('addModalTitle').textContent = 'Nieuw uitje';
  document.getElementById('addSaveBtn').textContent = 'uitje opslaan';
  document.getElementById('newName').value = '';
  document.getElementById('newTime').value = '';
  document.getElementById('newDesc').value = '';
  document.getElementById('newMaps').value = '';
  document.getElementById('newTransport').value = '🚶';
  document.getElementById('photoPreview').style.backgroundImage = '';
  document.getElementById('photoUploadLabel').textContent = 'tik om foto te kiezen';
  document.querySelectorAll('#newWeatherPicker .pill').forEach(b => b.classList.toggle('on', ['sun','cloud'].includes(b.dataset.v)));
  document.querySelectorAll('#newTypePicker .pill').forEach(b => b.classList.remove('on'));
  newIsFree = true; setFree(true);
  openModal('addModal');
}

function openEditModal(id) {
  const a = adventures.find(x => x.id === id);
  if (!a) return;
  editingId = id;
  pendingPhotoFile = null;
  document.getElementById('addModalTitle').textContent = 'Uitje bewerken';
  document.getElementById('addSaveBtn').textContent = 'wijzigingen opslaan';
  document.getElementById('newName').value = a.name || '';
  document.getElementById('newTime').value = a.time || '';
  document.getElementById('newDesc').value = a.description || '';
  document.getElementById('newMaps').value = a.mapsLink || '';
  document.getElementById('newTransport').value = a.transport || '🚗';
  // photo preview
  if (a.photo) {
    document.getElementById('photoPreview').style.backgroundImage = `url('${a.photo}')`;
    document.getElementById('photoUploadLabel').textContent = 'tik om foto te wijzigen';
  } else {
    document.getElementById('photoPreview').style.backgroundImage = '';
    document.getElementById('photoUploadLabel').textContent = 'tik om foto te kiezen';
  }
  document.querySelectorAll('#newWeatherPicker .pill').forEach(b => b.classList.toggle('on', (a.weather||[]).includes(b.dataset.v)));
  document.querySelectorAll('#newTypePicker .pill').forEach(b => b.classList.toggle('on', (a.types||[]).includes(b.dataset.v)));
  newIsFree = a.free;
  document.getElementById('pill-free').classList.toggle('on', a.free);
  document.getElementById('pill-paid').classList.toggle('on', !a.free);
  closeDetail();
  openModal('addModal');
}

function handlePhotoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  pendingPhotoFile = file;
  // lokale preview
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('photoPreview').style.backgroundImage = `url('${e.target.result}')`;
    document.getElementById('photoUploadLabel').textContent = 'foto geselecteerd ✓';
  };
  reader.readAsDataURL(file);
}

async function uploadPhoto(file, id) {
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
  const path = `adventure-${id}-${Date.now()}.${ext}`;

  // Gebruik FormData voor betere compatibiliteit
  const formData = new FormData();
  formData.append('', file);

  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/Photos/${path}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'x-upsert': 'true'
    },
    body: file
  });

  const responseText = await res.text();
  console.log('Upload response:', res.status, responseText);

  if (!res.ok) throw new Error(`Upload mislukt: ${res.status} ${responseText}`);
  return `${SUPABASE_URL}/storage/v1/object/public/Photos/${path}`;
}

async function saveAdventure() {
  const name = document.getElementById('newName').value.trim();
  const time = parseInt(document.getElementById('newTime').value) || 0;
  const transport = document.getElementById('newTransport').value;
  const description = document.getElementById('newDesc').value.trim();
  const mapsLink = document.getElementById('newMaps').value.trim();
  const weathers = [...document.querySelectorAll('#newWeatherPicker .pill.on')].map(b => b.dataset.v);
  const types    = [...document.querySelectorAll('#newTypePicker .pill.on')].map(b => b.dataset.v);

  if (!name) { alert('Geef het uitje een naam!'); return; }

  const btn = document.getElementById('addSaveBtn');
  btn.textContent = 'bezig…';
  btn.disabled = true;

  try {

  // extract coordinates from Maps link
  let lat = null, lng = null;
  if (mapsLink) {
    const coords = await coordsFromMapsLink(mapsLink);
    if (coords) { lat = coords.lat; lng = coords.lng; }
  }

  if (editingId !== null) {
    const a = adventures.find(x => x.id === editingId);
    if (a) {
      a.name = name; a.time = time; a.transport = transport;
      a.description = description; a.mapsLink = mapsLink;
      a.weather = weathers; a.types = types; a.free = newIsFree;
      if (pendingPhotoFile) a.photo = await uploadPhoto(pendingPhotoFile, a.id);
      if (mapsLink) { a.lat = lat; a.lng = lng; }
      await save(a);
    }
  } else {
    const newId = nextId++;
    let photo = null;
    if (pendingPhotoFile) photo = await uploadPhoto(pendingPhotoFile, newId);
    const newA = { id:newId, name, time, transport, weather:weathers, types, free:newIsFree, description, mapsLink, lat, lng, notes:'', fav:false, photo };
    adventures.push(newA);
    await insertAdventure(newA);
  }

  btn.textContent = editingId !== null ? 'wijzigingen opslaan' : 'uitje opslaan';
  btn.disabled = false;
  closeModal('addModal');
  switchTab('home');

  } catch(err) {
    console.error('Opslaan mislukt:', err);
    alert('Fout bij opslaan: ' + err.message);
    btn.textContent = editingId !== null ? 'wijzigingen opslaan' : 'uitje opslaan';
    btn.disabled = false;
  }
}

// ═══════════════════════════════════════════════
//  MODAL HELPERS

function openModal(id)  { document.getElementById(id).classList.remove('hidden'); document.body.style.overflow='hidden'; }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.body.style.overflow=''; }

  // toon laadscherm
  document.getElementById('homeView').innerHTML = `

      <div class="empty-icon">— laden —</div>

init();
